services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vietnam-tourism-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./backend/app/artifacts:/app/app/artifacts
      - ./backend/app/public:/app/app/public
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s